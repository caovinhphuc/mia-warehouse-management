  </head>
  <body>
    <!-- ==================== NOSCRIPT FALLBACK ==================== -->
    <noscript>
      <div
        style="
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background-color: #f3f4f6;
          display: flex;
          align-items: center;
          justify-content: center;
          z-index: 9999;
          font-family:
            -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu',
            'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        "
      >
        <div style="text-align: center; padding: 2rem; max-width: 600px">
          <h1 style="color: #111827; margin-bottom: 1rem">JavaScript Required</h1>
          <p style="color: #4b5563; margin-bottom: 1rem">
            Bạn cần bật JavaScript để chạy ứng dụng này.
          </p>
          <p style="color: #6b7280; font-size: 0.875rem">
            Please enable JavaScript to run this application.
          </p>
        </div>
      </div>
    </noscript>

    <!-- ==================== ROOT CONTAINER ==================== -->
    <!-- Google Tag Manager -->
    <div id="root"></div>

    <!-- ==================== ERROR HANDLING ==================== -->
    <script>
      // Global error handler for unhandled errors
      window.addEventListener('error', (event) => {
        console.error('Global Error:', event.error)
        // TODO: Send to error tracking service (e.g., Sentry, LogRocket)
        // Example: errorTracking.captureException(event.error);
      })

      // Handle unhandled promise rejections
      window.addEventListener('unhandledrejection', (event) => {
        console.error('Unhandled Promise Rejection:', event.reason)
        // TODO: Send to error tracking service
        // Example: errorTracking.captureException(event.reason);
      })

      // Performance monitoring
      if ('performance' in window && 'PerformanceObserver' in window) {
        try {
          const observer = new PerformanceObserver((list) => {
            for (const entry of list.getEntries()) {
              // Log long tasks (blocking main thread > 50ms)
              if (entry.entryType === 'longtask') {
                console.warn('Long Task Detected:', entry)
              }
            }
          })
          observer.observe({ entryTypes: ['longtask'] })
        } catch (e) {
          // PerformanceObserver not supported
          console.warn('PerformanceObserver not supported')
        }
      }
    </script>
  </body>
</html>
